name: Extract Source ZIP

on:
  push:
    paths:
      - '*.zip'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find and extract ZIP
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" | head -1)
          echo "Found ZIP: $ZIP"
          unzip -o "$ZIP" -x "*.zip"
          rm "$ZIP"
          rm -rf .github/workflows/build.yml

      - name: Commit extracted source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: extract source from ZIP" || echo "Nothing to commit"
          git push

  build:
    needs: extract
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -B

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: HLSMP-TPA
          path: target/HLSMP-TPA-*.jar
          if-no-files-found: error
